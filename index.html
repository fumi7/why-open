<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>なんで開いたの？</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="X">
<meta name="theme-color" content="#0f0f0f">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --card2: #222;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --sub: #888;
    --red: #e05555;
    --green: #4caf82;
    --accent: #e05555;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .app { width: 100%; max-width: 420px; }

  /* ===== QUESTION SCREEN ===== */
  .question-screen { animation: fadeIn .25s ease; }

  .q-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .app-icon {
    width: 44px; height: 44px;
    background: #000;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
  }
  .app-icon-edit {
    position: absolute;
    bottom: -4px; right: -4px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 16px; height: 16px;
    font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    color: var(--sub);
  }
  .q-header-text h1 {
    font-size: 13px;
    color: var(--sub);
    font-weight: 400;
  }
  .q-header-text h2 {
    font-size: 15px;
    font-weight: 600;
  }

  .q-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .q-stats {
    font-size: 12px;
    color: var(--red);
    margin-bottom: 28px;
  }

  .reasons { display: flex; flex-direction: column; gap: 10px; }

  .reason-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 15px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background .15s, border-color .15s;
    font-family: inherit;
  }
  .reason-btn:hover { background: #252525; border-color: #444; }
  .reason-btn .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.bad  { background: var(--red); }
  .dot.good { background: var(--green); }
  .reason-label { flex: 1; }
  .reason-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    color: #fff;
    opacity: .7;
  }
  .tag-bad  { background: var(--red); }
  .tag-good { background: var(--green); }

  .q-note {
    text-align: center;
    font-size: 11px;
    color: #555;
    margin-top: 16px;
  }

  /* ===== STATS SCREEN ===== */
  .stats-screen { animation: fadeIn .25s ease; }

  .stats-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .stats-header h2 { font-size: 18px; font-weight: 700; }
  .back-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    color: var(--sub);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }

  .waste-bar-wrap { margin-bottom: 20px; }
  .bar-track {
    height: 10px;
    background: var(--green);
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .bar-fill {
    height: 100%;
    background: var(--red);
    border-radius: 5px;
    transition: width .6s ease;
  }
  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--sub);
  }

  .stats-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .stat-row {
    background: var(--card);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .stat-row .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .stat-name { flex: 1; font-size: 14px; }
  .stat-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    color: #fff;
    opacity: .7;
  }
  .stat-count { font-size: 14px; font-weight: 700; color: var(--red); min-width: 48px; text-align: right; }
  .stat-count.good-color { color: var(--green); }

  .waste-callout {
    background: #2a1515;
    border: 1px solid #5a2020;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px;
    color: #f08080;
    line-height: 1.6;
  }
  .waste-callout strong { font-size: 22px; font-weight: 800; }

  .stats-footer {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 7px 14px;
    color: #666;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .reset-btn:hover { color: var(--red); border-color: var(--red); }

  /* ===== SETTINGS MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    animation: fadeIn .15s ease;
  }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 320px;
    max-width: 90vw;
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal label { font-size: 12px; color: var(--sub); display: block; margin-bottom: 5px; }
  .modal input, .modal select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 14px;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .modal-cancel {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    color: var(--sub);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .modal-save {
    background: var(--red);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  .stats-link {
    text-align: center;
    margin-top: 20px;
  }
  .stats-link button {
    background: transparent;
    border: none;
    color: var(--sub);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ===== STATE =====
const STORAGE_KEY = 'why-open-v1';

const DEFAULT_REASONS = [
  { id: 'r1', label: '暇つぶし',   tag: '無意識', good: false },
  { id: 'r2', label: 'なんとなく', tag: '無意識', good: false },
  { id: 'r3', label: '仕事で',     tag: '目的あり', good: true },
  { id: 'r4', label: '調べ物',     tag: '目的あり', good: true },
  { id: 'r5', label: '逃避',       tag: '無意識', good: false },
];

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return {
    appName: 'アプリ',
    appEmoji: '📱',
    reasons: DEFAULT_REASONS,
    todayDate: '',
    todayCount: 0,
    todayMinutes: 0,
    totalCount: 0,
    totalMinutes: 0,
    log: {},   // { reasonId: { count, minutes } }
  };
}

function saveState(st) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
}

let state = loadState();
let screen = 'question'; // 'question' | 'stats'
let showSettings = false;
let sessionStart = Date.now();

// ===== HELPERS =====
function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function ensureToday() {
  const today = todayStr();
  if (state.todayDate !== today) {
    state.todayDate = today;
    state.todayCount = 0;
    state.todayMinutes = 0;
  }
}

function elapsedMinutes() {
  return Math.max(1, Math.round((Date.now() - sessionStart) / 60000));
}

function recordReason(reasonId) {
  ensureToday();
  const mins = elapsedMinutes();
  state.todayCount++;
  state.todayMinutes += mins;
  state.totalCount++;
  state.totalMinutes += mins;
  if (!state.log[reasonId]) state.log[reasonId] = { count: 0, minutes: 0 };
  state.log[reasonId].count++;
  state.log[reasonId].minutes += mins;
  saveState(state);
  sessionStart = Date.now();
}

function wastePercent() {
  const total = state.totalCount;
  if (!total) return 0;
  const bad = state.reasons
    .filter(r => !r.good)
    .reduce((s,r) => s + (state.log[r.id]?.count || 0), 0);
  return Math.round(bad / total * 100);
}

function formatMin(m) {
  if (m < 60) return m + '分';
  return Math.floor(m/60) + '時間' + (m%60 ? (m%60) + '分' : '');
}

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (showSettings) {
    app.appendChild(renderSettingsModal());
  }

  if (screen === 'question') {
    app.appendChild(renderQuestion());
  } else {
    app.appendChild(renderStats());
  }
}

function renderQuestion() {
  ensureToday();
  const div = document.createElement('div');
  div.className = 'question-screen';

  div.innerHTML = `
    <div class="q-header">
      <div class="app-icon" id="btn-settings">
        <span id="emoji-display">${state.appEmoji}</span>
        <span class="app-icon-edit">✎</span>
      </div>
      <div class="q-header-text">
        <h1>${state.appName}を開こうとしています</h1>
        <h2>どうして開いたの？</h2>
      </div>
    </div>
    <div class="q-stats">● 今日 ${state.todayCount}回目・累計 ${formatMin(state.todayMinutes)}</div>
    <div class="reasons" id="reasons-list"></div>
    <div class="q-note">ひとつ選ぶと記録されます</div>
    <div class="stats-link"><button id="btn-stats">統計を見る</button></div>
  `;

  const list = div.querySelector('#reasons-list');
  state.reasons.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'reason-btn';
    btn.innerHTML = `
      <span class="dot ${r.good ? 'good' : 'bad'}"></span>
      <span class="reason-label">${r.label}</span>
      <span class="reason-tag ${r.good ? 'tag-good' : 'tag-bad'}">${r.tag}</span>
    `;
    btn.onclick = () => {
      recordReason(r.id);
      // Xアプリへ飛ぶ（インストール済みならアプリ、なければブラウザ版）
      window.location.href = 'twitter://';
      setTimeout(() => {
        window.location.href = 'https://x.com';
      }, 800);
      render();
    };
    list.appendChild(btn);
  });

  div.querySelector('#btn-settings').onclick = () => { showSettings = true; render(); };
  div.querySelector('#btn-stats').onclick = () => { screen = 'stats'; render(); };

  return div;
}

function renderStats() {
  const div = document.createElement('div');
  div.className = 'stats-screen';

  const wp = wastePercent();
  const totalBadMin = state.reasons
    .filter(r => !r.good)
    .reduce((s,r) => s + (state.log[r.id]?.minutes || 0), 0);

  let rows = state.reasons.map(r => {
    const entry = state.log[r.id] || { count: 0, minutes: 0 };
    return { ...r, count: entry.count, minutes: entry.minutes };
  }).sort((a,b) => b.count - a.count);

  div.innerHTML = `
    <div class="stats-header">
      <h2>統計</h2>
      <button class="back-btn" id="btn-back">← 戻る</button>
    </div>
    <div class="waste-bar-wrap">
      <div class="bar-labels"><span>無意識 ${wp}%</span><span>目的あり ${100-wp}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${wp}%"></div></div>
    </div>
    <div class="stats-list" id="stats-list"></div>
    ${wp > 0 ? `
    <div class="waste-callout">
      <strong>${wp}%</strong> が「無意識」の起動。<br>
      累計 ${formatMin(totalBadMin)}、本当に必要だった？
    </div>` : ''}
    <div class="stats-footer">
      <button class="reset-btn" id="btn-reset">データをリセット</button>
    </div>
  `;

  const list = div.querySelector('#stats-list');
  rows.forEach(r => {
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = `
      <span class="dot ${r.good ? 'good' : 'bad'}"></span>
      <span class="stat-name">${r.label}</span>
      <span class="stat-tag ${r.good ? 'tag-good' : 'tag-bad'}">${r.tag}</span>
      <span class="stat-count ${r.good ? 'good-color' : ''}">${r.count}回<br><small style="font-size:11px;font-weight:400;color:#888">${formatMin(r.minutes)}</small></span>
    `;
    list.appendChild(row);
  });

  div.querySelector('#btn-back').onclick = () => { screen = 'question'; render(); };
  div.querySelector('#btn-reset').onclick = () => {
    if (confirm('統計データをすべて削除しますか？')) {
      state.log = {};
      state.todayCount = 0; state.todayMinutes = 0;
      state.totalCount = 0; state.totalMinutes = 0;
      saveState(state);
      render();
    }
  };

  return div;
}

function renderSettingsModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  overlay.innerHTML = `
    <div class="modal">
      <h3>⚙ 設定</h3>
      <label>アプリ名</label>
      <input id="set-name" type="text" value="${state.appName}" placeholder="例: X, Instagram">
      <label>絵文字アイコン</label>
      <input id="set-emoji" type="text" value="${state.appEmoji}" placeholder="📱" maxlength="2">
      <div class="modal-actions">
        <button class="modal-cancel" id="set-cancel">キャンセル</button>
        <button class="modal-save" id="set-save">保存</button>
      </div>
    </div>
  `;

  overlay.querySelector('#set-cancel').onclick = () => { showSettings = false; render(); };
  overlay.querySelector('#set-save').onclick = () => {
    const name = overlay.querySelector('#set-name').value.trim();
    const emoji = overlay.querySelector('#set-emoji').value.trim();
    if (name) state.appName = name;
    if (emoji) state.appEmoji = emoji;
    saveState(state);
    showSettings = false;
    render();
  };
  overlay.onclick = (e) => { if (e.target === overlay) { showSettings = false; render(); } };

  return overlay;
}

// ===== BOOT =====
render();
</script>
</body>
</html>
